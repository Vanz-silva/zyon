<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Em memória Zyon</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <video autoplay muted loop id="bg-video">
      <source src="./assets/videos/sky.mp4" type="video/mp4" />
    </video>

    <div class="main-container pt-5 pb-5">
      <div class="d-flex flex-column text-center zy">
        <div><h1>Em memória Zyon Wesley</h1></div>
        <div><h3>Te amamos além do infinito meu anjinho</h3></div>
        <!-- Música -->

        <div class="d-flex justify-content-center">
          <button id="playMusic" class="btn btn-dark music-btn">
            ▶ Tocar Música
          </button>
        </div>

        <iframe id="player" width="0" height="0" allow="autoplay"> </iframe>
      </div>
      <div class="c-grid">
        <div class="grid">
          <img
            src="https://images.unsplash.com/photo-1509042239860-f550ce710b93"
          />

          <img
            src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735"
          />

          <img
            src="https://images.unsplash.com/photo-1509785307050-d4066910ec1e"
          />

          <img
            src="https://images.unsplash.com/photo-1497935586047-939dc06b32c7"
          />

          <img
            src="https://images.unsplash.com/photo-1498804103079-a6351b050096"
          />

          <img
            src="https://images.unsplash.com/photo-1511920170033-f8396924c348"
          />
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
